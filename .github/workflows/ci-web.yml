name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "eslint.config.js"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "eslint.config.js"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-web.yml"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo run build --filter=@repo/shared --filter=@repo/web

      - name: Typecheck
        run: pnpm exec turbo run typecheck --filter=@repo/shared --filter=@repo/web

      - name: Lint
        run: pnpm exec turbo run lint --filter=@repo/shared --filter=@repo/web

      - name: Test
        run: pnpm exec turbo run test --filter=@repo/shared --filter=@repo/web
