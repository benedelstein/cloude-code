name: API Server CI

on:
  push:
    paths:
      - "services/api-server/**"
      - "packages/shared/**"
      - "packages/vm-agent/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "eslint.config.js"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-api-server.yml"
  pull_request:
    paths:
      - "services/api-server/**"
      - "packages/shared/**"
      - "packages/vm-agent/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "eslint.config.js"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-api-server.yml"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo run build --filter=@repo/shared --filter=@repo/vm-agent --filter=@repo/api-server

      - name: Typecheck
        run: pnpm exec turbo run typecheck --filter=@repo/shared --filter=@repo/vm-agent --filter=@repo/api-server

      - name: Lint
        run: pnpm exec turbo run lint --filter=@repo/shared --filter=@repo/vm-agent --filter=@repo/api-server

      - name: Test
        run: pnpm exec turbo run test --filter=@repo/shared --filter=@repo/vm-agent --filter=@repo/api-server
