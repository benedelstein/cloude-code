name: Deploy API Server

on:
  push:
    branches:
      - main
    paths:
      - "services/api-server/**"
      - "packages/shared/**"
      - "packages/vm-agent/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api-server.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --filter "@repo/api-server"

      - name: Typecheck
        run: pnpm typecheck --filter "@repo/api-server"

      - name: Lint
        run: pnpm lint --filter "@repo/api-server"

      - name: Test
        run: pnpm test --filter "@repo/api-server"

      - name: Apply D1 migrations
        run: pnpm --filter @repo/api-server db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: services/api-server
