strict: true

included:
  - CloudeCode
  - CloudeCodeTests
  - CloudeCodeUITests
  - Modules/API/Sources
  - Modules/CoreAPI/Sources
  - Modules/Domain/Sources
  - Modules/Entities/Sources

excluded:
  - "**/.build"
  - CloudeCode/Assets.xcassets
  - CloudeCode/Generated
  # Transpiled from packages/shared Zod schemas; fix style in the generator, not here.
  - Modules/CoreAPI/Sources/CoreAPI/Generated
  - Modules/CoreAPI/Tests

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_assert
  - discouraged_none_name
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - let_var_whitespace
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - nslocalizedstring_key
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - prefer_self_type_over_type_of_self
  - prohibited_interface_builder
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - trailing_newline
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id

line_length:
  warning: 120
  error: 140
  ignores_comments: false
  ignores_urls: true
  ignores_function_declarations: false

file_length:
  warning: 500
  error: 600

type_body_length:
  warning: 250
  error: 350

function_body_length:
  warning: 45
  error: 70

cyclomatic_complexity:
  warning: 8
  error: 12

large_tuple:
  warning: 2
  error: 3

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60
